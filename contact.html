<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Estech Solutions</title>
  <meta name="description" content="Contact Estech Solutions for AI automation, custom software, and product development projects." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1220;--surface:#111c33;--text:#e2e8f0;--muted:#94a3b8;--accent:#22c55e}
    body{font-family:Inter,system-ui;background:linear-gradient(160deg,#020617,#0b1220);color:var(--text)}
    .navbar{background:rgba(2,6,23,.8)!important;backdrop-filter:blur(10px)}
    .hero{padding:5.5rem 0 3rem;text-align:center}
    .panel{background:var(--surface);border:1px solid rgba(148,163,184,.2);border-radius:16px;box-shadow:0 14px 32px rgba(0,0,0,.35)}
    .chatbox{height:280px;overflow-y:auto;padding:1rem}
    .msg{padding:.65rem .85rem;border-radius:.7rem;margin-bottom:.55rem;max-width:82%}
    .msg.user{margin-left:auto;background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.38)}
    .msg.ai{background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.28)}
    .form-control,.form-select{background:#0a152a;border:1px solid rgba(148,163,184,.25);color:#e2e8f0}
    .form-control::placeholder{color:#94a3b8}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">ESTECH</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContact"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navContact">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="works.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="hire.html">Hire Us</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="hero container">
  <h1 class="display-5 fw-bold">Talk to Estech</h1>
  <p class="text-secondary-emphasis">Tell us what you're building, and we'll help you map the smartest path to launch.</p>
</section>

<main class="container pb-5">
  <div class="row g-4">
    <div class="col-lg-6">
      <div class="panel p-4" id="chat">
        <h4 class="fw-bold">AI Assistant</h4>
        <div class="chatbox panel mt-3" id="chatbox">
          <div class="msg ai">Hello! I'm Estech AI. Share your project goal and I'll guide your next step.</div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <input type="text" id="userInput" class="form-control" placeholder="Type a message...">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <div class="col-lg-6">
      <div class="panel p-4">
        <h4 class="fw-bold">Send a Message</h4>
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="row g-3 mt-1">
          <div class="col-md-6"><input type="text" name="name" class="form-control" placeholder="Your Name" required></div>
          <div class="col-md-6"><input type="email" name="email" class="form-control" placeholder="Your Email" required></div>
          <div class="col-12"><input type="text" name="subject" class="form-control" placeholder="Subject"></div>
          <div class="col-12"><textarea name="message" rows="5" class="form-control" placeholder="Project details" required></textarea></div>
          <div class="col-12"><button class="btn btn-success btn-lg w-100">Send Message</button></div>
        </form>
      </div>
    </div>
  </div>
</main>

<footer class="py-4 text-center text-secondary">
  <div class="container">&copy; <span id="year"></span> Estech Solutions • <a href="https://github.com/estechsolutions">GitHub</a></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('year').textContent=new Date().getFullYear();
  function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    const chatbox = document.getElementById('chatbox');
    chatbox.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = '';
    setTimeout(() => {
      chatbox.innerHTML += `<div class="msg ai">Great question. Share your timeline and budget, and our team will reply with a practical plan.</div>`;
      chatbox.scrollTop = chatbox.scrollHeight;
    }, 700);
  }
</script>
</body>
</html>
